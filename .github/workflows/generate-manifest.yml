name: Generate Image Manifest

on:
  push:
    paths:
      - 'images/**'   # runs only when images folder changes
  workflow_dispatch:  # also lets you trigger it manually

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit images.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate images.json
        run: |
          python3 - <<'EOF'
          import os, json

          folder = "images"
          extensions = {".jpg", ".jpeg", ".png", ".gif", ".webp", ".bmp", ".svg", ".avif"}

          files = sorted([
            f for f in os.listdir(folder)
            if os.path.splitext(f)[1].lower() in extensions
          ])

          output = os.path.join(folder, "images.json")
          with open(output, "w") as fp:
            json.dump(files, fp, indent=2)

          print(f"✅ Found {len(files)} images → written to {output}")
          EOF

      - name: Commit and push images.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/images.json
          git diff --cached --quiet || git commit -m "chore: update images.json [skip ci]"
          git push
